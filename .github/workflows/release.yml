name: Automated Release Pipeline

on:
  push:
    branches:
      - main
      - release

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    environment: production

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git Identity
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "github-actions-bot@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23
          check-latest: true
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Install Dependencies
        run: pnpm install

      - name: Execute Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure local production tracks remote (create if missing)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch origin +refs/heads/production:refs/remotes/origin/production || true
          if git ls-remote --exit-code --heads origin production >/dev/null 2>&1; then
            # Remote branch exists; checkout tracking local branch
            if git show-ref --quiet refs/heads/production; then
              git checkout production
              git branch --set-upstream-to=origin/production production || true
            else
              git checkout -b production --track origin/production
            fi
          else
            # Remote doesn't exist; create and push initial production
            git checkout -b production
            git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
            git push -u origin production
          fi

      - name: Reset pnpm-lock.yaml changes
        run: |
          if [ -f pnpm-lock.yaml ]; then git checkout -- pnpm-lock.yaml; fi

      - name: Merge main into production and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch origin
          # Ensure we are on production and tracking remote
          git checkout production
          git branch --set-upstream-to=origin/production production || true
          # Merge latest main
          git merge --no-edit origin/main || true
          mkdir -p public
          cp CHANGELOG.md public/CHANGELOG.md
          pnpm tsx scripts/update-version.ts
          git add -f public/CHANGELOG.md public/version.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync production with main (auto)"
          fi
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
          # Try normal push first; if rejected due to non-fast-forward, rebase then push with lease
          if git push origin production; then
            echo "Pushed production successfully"
          else
            echo "Non-fast-forward detected. Rebasing onto origin/production and retrying with --force-with-lease"
            git fetch origin
            # Rebase commits if any local commits exist; if nothing to rebase, continue
            git rebase origin/production || true
            git push --force-with-lease origin production
          fi

      - name: Verify Deployment Assets
        run: |
          [ -f "public/CHANGELOG.md" ] || (echo "❌ Falta public/CHANGELOG.md" && exit 1)
          [ -f "public/version.json" ] || (echo "❌ Falta public/version.json" && exit 1)
          echo "✅ Todos los assets están listos para producción"
  publish-tauri:
    if: github.ref == 'refs/heads/release'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Arm based macs
            args: --target aarch64-apple-darwin
          - platform: macos-latest # Intel based macs
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 23.8.0

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
        # webkitgtk 4.0 is for Tauri v1 - webkitgtk 4.1 is for Tauri v2.

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: nuxtor-v__VERSION__
          releaseName: Nuxtor v__VERSION__
          releaseBody: After installing the Apple app you have to run "xattr -c /Applications/Nuxtor.app" once before launching
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
